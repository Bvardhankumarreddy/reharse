# ── Vertical Pod Autoscaler Policies ──────────────────────────────────────────
# Requires VPA controller installed in the cluster:
#   kubectl apply -f https://github.com/kubernetes/autoscaler/releases/latest/download/vpa-v1-crd-gen.yaml
#   kubectl apply -f https://github.com/kubernetes/autoscaler/releases/latest/download/vpa-rbac.yaml
#
# Mode: Auto — VPA will automatically update CPU/memory requests based on usage.
# Limits are preserved; only requests are adjusted.

apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: ai-engine-vpa
  namespace: rehearse
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-engine
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: ai-engine
        minAllowed:
          cpu: 25m
          memory: 64Mi
        maxAllowed:
          cpu: 1500m
          memory: 1Gi
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: api-vpa
  namespace: rehearse
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: api
        minAllowed:
          cpu: 25m
          memory: 64Mi
        maxAllowed:
          cpu: 800m
          memory: 512Mi
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: web-vpa
  namespace: rehearse
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: web
        minAllowed:
          cpu: 25m
          memory: 64Mi
        maxAllowed:
          cpu: 800m
          memory: 512Mi
