# IMPORTANT: Do NOT commit real values here.
# Use `kubectl create secret generic` or Sealed Secrets / External Secrets in production.
# This file is a template — replace <base64> placeholders before applying.
#
# To encode:  echo -n "your_value" | base64
# To apply:   kubectl apply -f 01-secrets.yaml -n rehearse

apiVersion: v1
kind: Secret
metadata:
  name: rehearse-secrets
  namespace: rehearse
type: Opaque
data:
  POSTGRES_PASSWORD:    <base64>   # strong DB password
  BETTER_AUTH_SECRET:   <base64>   # 32+ char random string
  GOOGLE_CLIENT_ID:     <base64>
  GOOGLE_CLIENT_SECRET: <base64>
  GITHUB_CLIENT_ID:     <base64>
  GITHUB_CLIENT_SECRET: <base64>
  OPENAI_API_KEY:       <base64>
