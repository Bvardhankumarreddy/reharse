apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: rehearse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: rehearse-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: API_URL
              value: http://api-svc:3001
            - name: BETTER_AUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: rehearse-config
                  key: BETTER_AUTH_URL
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: BETTER_AUTH_SECRET
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql://rehearse:$(POSTGRES_PASSWORD)@postgres-svc:5432/rehearse
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: GITHUB_CLIENT_ID
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: GITHUB_CLIENT_SECRET
            - name: STORAGE_LAMBDA_URL
              valueFrom:
                configMapKeyRef:
                  name: rehearse-config
                  key: STORAGE_LAMBDA_URL
            - name: STORAGE_LAMBDA_SECRET
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: STORAGE_LAMBDA_SECRET
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /pricing
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /pricing
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: web-svc
  namespace: rehearse
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-hpa
  namespace: rehearse
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
