apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: rehearse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: rehearse-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            # ── ConfigMap ──────────────────────────────────────────────────────
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: rehearse-config
                  key: REDIS_URL
            - name: AI_ENGINE_URL
              valueFrom:
                configMapKeyRef:
                  name: rehearse-config
                  key: AI_ENGINE_URL
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: rehearse-config
                  key: CORS_ORIGIN
            - name: FRONTEND_URL
              valueFrom:
                configMapKeyRef:
                  name: rehearse-config
                  key: FRONTEND_URL
            - name: ADMIN_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: rehearse-config
                  key: ADMIN_EMAIL
            - name: RAZORPAY_DAYPASS_AMOUNT
              valueFrom:
                configMapKeyRef:
                  name: rehearse-config
                  key: RAZORPAY_DAYPASS_AMOUNT
            - name: GOOGLE_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: rehearse-config
                  key: GOOGLE_REDIRECT_URI
            - name: STORAGE_LAMBDA_URL
              valueFrom:
                configMapKeyRef:
                  name: rehearse-config
                  key: STORAGE_LAMBDA_URL
            # ── DATABASE_URL (secret + configmap combined) ─────────────────────
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql://rehearse:$(POSTGRES_PASSWORD)@postgres-svc:5432/rehearse
            # ── Secrets ────────────────────────────────────────────────────────
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: BETTER_AUTH_SECRET
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: GOOGLE_STATE_SECRET
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: GOOGLE_STATE_SECRET
            - name: RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: RAZORPAY_KEY_ID
            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: RAZORPAY_KEY_SECRET
            - name: RAZORPAY_PLAN_WEEKLY
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: RAZORPAY_PLAN_WEEKLY
            - name: RAZORPAY_PLAN_MONTHLY
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: RAZORPAY_PLAN_MONTHLY
            - name: RAZORPAY_PLAN_YEARLY
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: RAZORPAY_PLAN_YEARLY
            - name: RAZORPAY_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: RAZORPAY_WEBHOOK_SECRET
            - name: STORAGE_LAMBDA_SECRET
              valueFrom:
                secretKeyRef:
                  name: rehearse-secrets
                  key: STORAGE_LAMBDA_SECRET
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3001
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: rehearse
spec:
  selector:
    app: api
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: rehearse
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
