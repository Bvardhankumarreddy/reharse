[build]
dockerfilePath = "Dockerfile"
buildArgs = { NEXT_PUBLIC_API_URL = "${{NEXT_PUBLIC_API_URL}}", NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = "${{NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}}" }

[deploy]
healthcheckPath = "/pricing"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
