<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-dim": "#d2d9f4",
              "inverse-primary": "#adc6ff",
              "surface": "#faf8ff",
              "error": "#ba1a1a",
              "primary-fixed-dim": "#adc6ff",
              "secondary-container": "#8a4cfc",
              "outline-variant": "#c2c6d6",
              "on-secondary-fixed-variant": "#5a00c6",
              "outline": "#727785",
              "on-tertiary-fixed-variant": "#004c6e",
              "on-primary": "#ffffff",
              "secondary-fixed-dim": "#d2bbff",
              "error-container": "#ffdad6",
              "on-primary-container": "#fefcff",
              "on-secondary": "#ffffff",
              "on-error-container": "#93000a",
              "on-secondary-container": "#fffbff",
              "background": "#faf8ff",
              "tertiary": "#00628d",
              "on-tertiary-fixed": "#001e2f",
              "on-surface": "#131b2e",
              "surface-container-high": "#e2e7ff",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#f2f3ff",
              "on-surface-variant": "#424754",
              "on-primary-fixed-variant": "#004395",
              "primary-container": "#2170e4",
              "tertiary-fixed-dim": "#89ceff",
              "secondary": "#712ae2",
              "primary-fixed": "#d8e2ff",
              "inverse-on-surface": "#eef0ff",
              "tertiary-container": "#007cb1",
              "surface-variant": "#dae2fd",
              "surface-tint": "#005ac2",
              "inverse-surface": "#283044",
              "primary": "#0058be",
              "surface-container": "#eaedff",
              "on-tertiary-container": "#fcfcff",
              "on-error": "#ffffff",
              "tertiary-fixed": "#c9e6ff",
              "surface-container-highest": "#dae2fd",
              "secondary-fixed": "#eaddff",
              "on-background": "#131b2e",
              "surface-bright": "#faf8ff",
              "on-primary-fixed": "#001a42",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed": "#25005a"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"],
              "mono": ["JetBrains Mono"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(138, 76, 252, 0.05);
            backdrop-filter: blur(20px);
        }
        .ai-glow {
            box-shadow: 0 0 40px -10px rgba(113, 42, 226, 0.2);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e7ff; border-radius: 10px; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-secondary/20 min-h-screen flex flex-col">
<!-- Top Navigation Shell (Suppressing Bottom Bar for focused Task) -->
<header class="w-full top-0 sticky z-50 bg-[#f2f3ff] dark:bg-slate-900/50 flex items-center justify-between px-6 py-4">
<div class="flex items-center gap-3">
<span class="bg-secondary/10 text-secondary px-3 py-1 rounded-full text-[10px] font-bold tracking-[0.05em] uppercase">Behavioral</span>
<div class="h-4 w-[1px] bg-outline-variant/30"></div>
<span class="font-mono text-sm font-medium tracking-tight text-on-surface-variant">08:42</span>
</div>
<div class="flex items-center gap-4">
<span class="text-xs font-semibold text-on-surface-variant uppercase tracking-widest">Q3 of 8</span>
<button class="text-error font-bold text-xs uppercase tracking-widest hover:bg-error/5 px-3 py-2 rounded-xl transition-colors duration-200 active:scale-95">
                End
            </button>
</div>
</header>
<main class="flex-grow flex flex-col px-6 pt-8 pb-32 max-w-2xl mx-auto w-full">
<!-- AI Panel (Stoic Centerpiece) -->
<section class="flex flex-col items-center mb-10 text-center">
<div class="relative mb-4">
<div class="w-20 h-20 rounded-full bg-gradient-to-br from-secondary to-primary p-[2px] ai-glow">
<div class="w-full h-full rounded-full bg-surface-container-lowest flex items-center justify-center overflow-hidden">
<div class="w-16 h-16 rounded-full bg-gradient-to-tr from-secondary/20 to-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-3xl" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
</div>
</div>
<div class="absolute -bottom-1 -right-1 w-5 h-5 bg-surface rounded-full flex items-center justify-center">
<div class="w-3 h-3 bg-secondary rounded-full animate-pulse"></div>
</div>
</div>
<h2 class="text-lg font-bold tracking-tight text-on-surface mb-1">InterviewAI</h2>
<div class="flex items-center gap-2">
<span class="text-[10px] font-bold text-secondary uppercase tracking-[0.1em]">Listening</span>
</div>
</section>
<!-- Question Canvas -->
<article class="mb-12">
<h1 class="text-2xl font-semibold leading-relaxed tracking-tight text-on-surface">
                "Tell me about a time you had to make a difficult decision with incomplete information..."
            </h1>
</article>
<!-- Answer Section -->
<section class="flex-grow flex flex-col">
<div class="flex items-center justify-between mb-4">
<label class="text-[10px] font-bold text-outline uppercase tracking-[0.15em]">Your Answer</label>
<span class="font-mono text-[10px] text-on-surface-variant bg-surface-container-high px-2 py-0.5 rounded">142 WORDS</span>
</div>
<div class="relative flex-grow group">
<textarea class="w-full h-full min-h-[250px] bg-surface-container-lowest border-none focus:ring-0 text-lg leading-relaxed text-on-surface-variant placeholder:text-outline/40 resize-none p-0 selection:bg-primary/10 font-body" placeholder="Start typing your response here. Focus on the STAR method..."></textarea>
<!-- Subtle Gradient Overlay for Focus -->
<div class="absolute bottom-0 left-0 w-full h-12 bg-gradient-to-t from-surface-container-lowest to-transparent pointer-events-none"></div>
</div>
</section>
</main>
<!-- Contextual Control Bar -->
<footer class="fixed bottom-0 left-0 w-full bg-surface/80 backdrop-blur-xl px-6 py-6 border-none z-50">
<div class="max-w-2xl mx-auto flex items-center justify-between gap-4">
<!-- Secondary Actions -->
<div class="flex items-center gap-2">
<button class="w-12 h-12 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center hover:bg-surface-container-highest transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined" data-icon="mic_none">mic_none</span>
</button>
<button class="px-5 h-12 rounded-full text-xs font-bold text-outline uppercase tracking-widest hover:text-on-surface transition-colors duration-200">
                    Pass
                </button>
</div>
<!-- Primary Action -->
<button class="flex-grow h-14 rounded-full bg-gradient-to-r from-primary to-primary-container text-white font-bold text-sm uppercase tracking-widest shadow-lg shadow-primary/10 hover:shadow-primary/20 transition-all duration-300 active:scale-95 flex items-center justify-center gap-3">
<span>Submit Answer</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
<!-- Decorative Content Bleed -->
<div class="fixed top-1/4 -right-20 w-64 h-64 bg-secondary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-1/4 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
